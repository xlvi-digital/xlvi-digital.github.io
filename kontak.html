<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kontak | XLVI-Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #5f2c82, #49a09d);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #fff;
      }

      .linktree-container {
        width: 100%;
        max-width: 380px;
        text-align: center;
      }

      .logo {
        width: 110px;
        height: 110px;
        margin: 0 auto 15px;
        border-radius: 50%;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      }

      .logo img {
        width: 85%;
        height: auto;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .tagline {
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 30px;
      }

      .link-button {
        display: block;
        width: 100%;
        padding: 14px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: #fff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .link-button:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-3px);
      }

      .footer {
        margin-top: 25px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="linktree-container">
      <!-- Logo XLVI -->
      <div class="logo">
        <img src="images/mylogo.jpg" alt="XLVI Logo" />
      </div>

      <h1>XLVI-Digital</h1>
      <div class="tagline">Exploring Limitless Visual Imagination</div>

      <!-- WhatsApp -->
      <a href="https://wa.me/6282119502976" target="_blank" class="link-button"> Hubungi via WhatsApp </a>

      <!-- Katalog -->
      <a href="https://link-katalog-anda.com" target="_blank" class="link-button"> Lihat Katalog XLVI </a>

      <div class="footer">© 2026 XLVI-Digital</div>
    </div>
  </body>
</html>
