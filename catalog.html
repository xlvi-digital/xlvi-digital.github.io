<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Katalog Undangan | XLVI-Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="assets/catalog.css" />
  </head>
  <body>
    <section class="jumbotron">
      <h1>Katalog Undangan Digital</h1>
      <p>Pilih tema & paket undangan terbaik bersama XLVI-Digital</p>
    </section>

    <div class="stepper">
      <div class="step active">1 Pilih Tema</div>
      <div class="step">2 Jenis Paket</div>
      <div class="step">3 Pilih Paket</div>
      <div class="step">4 WhatsApp</div>
    </div>

    <!-- FILTER -->
    <section class="filter-section">
      <button class="filter-btn active" onclick="filterTheme('all',event)">Semua Tema</button>
      <button class="filter-btn" onclick="filterTheme('botanical',event)">Botanical</button>
      <button class="filter-btn" onclick="filterTheme('luxury',event)">Luxury</button>
      <button class="filter-btn" onclick="filterTheme('romantic',event)">Romantic</button>
    </section>

    <section class="preview-catalog">
      <div class="preview-card" data-theme="botanical" data-photo="yes" onclick="selectTheme(this,'Botanical Green','Botanical','Dengan Foto')">
        <div class="img-wrapper">
          <img src="images/portfolio/1.png" alt="Botanical Green" />
        </div>

        <div class="card-body">
          <h3>Botanical Green</h3>
          <span class="tag">Botanical · Foto</span>
          <p>Nuansa natural dan segar.</p>

          <div class="card-action">
            <button class="btn-demo" type="button">Demo</button>
            <button class="btn-select" type="button">Pilih</button>
          </div>
        </div>
      </div>

      <div class="preview-card" data-theme="luxury" data-photo="yes" onclick="selectTheme(this,'Luxury Gold','Luxury','Dengan Foto')">
        <div class="img-wrapper">
          <img src="images/portfolio/3.png" alt="Luxury Gold" />
        </div>

        <div class="card-body">
          <h3>Luxury Gold</h3>
          <span class="tag">Luxury · Foto</span>
          <p>Elegan dan eksklusif.</p>

          <div class="card-action">
            <button class="btn-demo" type="button">Demo</button>
            <button class="btn-select" type="button">Pilih</button>
          </div>
        </div>
      </div>
    </section>

    <!-- PACKAGE TYPE -->
    <section class="package-type">
      <div class="type-card" onclick="selectPackageType('Digital Only',this)">Digital Only</div>
      <div class="type-card" onclick="selectPackageType('Hybrid',this)">Hybrid (Digital + Fisik)</div>
    </section>

    <!-- PACKAGE LIST -->
    <section class="catalog" id="packageList"></section>

    <div id="orderBar" class="order-bar hidden"></div>

    <script src="assets/catalog.js"></script>
  </body>
</html>
